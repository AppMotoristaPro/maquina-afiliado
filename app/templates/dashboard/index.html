{% extends 'base.html' %}
{% block content %}

<div class="flex justify-center gap-4 mb-8">
    <button id="btnAbaML" onclick="mudarAba('ml')" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md transition">Mercado Livre</button>
    <button id="btnAbaSH" onclick="mudarAba('shopee')" class="bg-slate-200 text-slate-500 px-6 py-2 rounded-lg font-bold transition">Shopee</button>
</div>

<div class="flex flex-col items-center mb-8" id="painel-garimpo">
    <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Máquina de Comissão</h1>
    
    <div class="flex gap-2 w-full max-w-lg mb-6">
        <input type="text" id="urlDireta" placeholder="Link direto do Mercado Livre..." class="flex-1 p-3 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-blue-200 outline-none">
        <button onclick="buscarPorUrl()" class="bg-slate-800 text-white px-6 rounded-xl font-bold">Buscar</button>
    </div>

    <button onclick="buscar()" id="btnGarimpar" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-bold shadow-lg transition transform hover:scale-105 w-full max-w-lg">
        🎲 GARIMPAR AGORA
    </button>
</div>

<div id="progresso-container" class="hidden w-full max-w-xl mx-auto mb-10 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
    <div class="flex justify-between mb-2">
      <span id="progresso-msg" class="text-sm font-bold text-blue-700">Aguardando...</span>
      <span id="progresso-pct" class="text-sm font-bold text-blue-700">0%</span>
    </div>
    <div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden">
      <div id="progresso-bar" class="bg-blue-600 h-4 rounded-full transition-all duration-700" style="width: 0%"></div>
    </div>
</div>

<div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>

<script>
    let marketplaceAtual = 'ml';

    function mudarAba(mp) {
        marketplaceAtual = mp;
        const btnML = document.getElementById('btnAbaML');
        const btnSH = document.getElementById('btnAbaSH');
        const btnGarimpar = document.getElementById('btnGarimpar');
        
        if(mp === 'shopee') {
            btnSH.className = "bg-orange-500 text-white px-6 py-2 rounded-lg font-bold shadow-md transition";
            btnML.className = "bg-slate-200 text-slate-500 px-6 py-2 rounded-lg font-bold transition";
            btnGarimpar.className = btnGarimpar.className.replace('blue', 'orange');
        } else {
            btnML.className = "bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md transition";
            btnSH.className = "bg-slate-200 text-slate-500 px-6 py-2 rounded-lg font-bold transition";
            btnGarimpar.className = btnGarimpar.className.replace('orange', 'blue');
        }
    }

    function setBarra(mostrar, pct, msg) {
        document.getElementById('progresso-container').classList.toggle('hidden', !mostrar);
        document.getElementById('progresso-bar').style.width = pct + '%';
        document.getElementById('progresso-pct').innerText = pct + '%';
        document.getElementById('progresso-msg').innerText = msg;
    }

    async function buscar() {
        document.getElementById('grid').innerHTML = '';
        setBarra(true, 15, `Minerando ${marketplaceAtual.toUpperCase()}...`);
        
        let urlsVistas = JSON.parse(localStorage.getItem('urlsVistas')) || [];

        const res = await fetch('/api/garimpar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({urls_vistas: urlsVistas, marketplace: marketplaceAtual})
        });
        const data = await res.json();
        
        setBarra(true, 100, "Garimpo Concluído!");
        data.forEach(item => urlsVistas.push(item.url));
        localStorage.setItem('urlsVistas', JSON.stringify(urlsVistas));
        
        setTimeout(() => { setBarra(false, 0, ""); renderGrid(data); }, 800);
    }

    function renderGrid(data) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        data.forEach(p => {
            grid.innerHTML += `
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                <div class="h-40 bg-slate-50 p-4 flex items-center justify-center">
                    <img src="${p.imagens[0]}" class="max-h-full object-contain mix-blend-multiply">
                </div>
                <div class="p-4 flex-grow flex flex-col">
                    <h3 class="text-[11px] font-bold text-slate-700 line-clamp-2 mb-2">${p.titulo}</h3>
                    <p class="text-blue-600 font-black text-sm">R$ ${p.preco.toFixed(2).replace('.', ',')}</p>
                    <button onclick='gerar(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="w-full bg-slate-800 text-white py-2 rounded-lg text-[10px] font-bold mt-4">CRIAR REELS</button>
                </div>
            </div>`;
        });
    }

    async function gerar(p) {
        const link = prompt("Cole seu link de afiliado:");
        if(!link) return;
        document.getElementById('grid').innerHTML = '';
        document.getElementById('painel-garimpo').classList.add('hidden');
        setBarra(true, 5, "Iniciando...");

        fetch('/api/produzir', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({...p, link_afiliado: link, plataforma: marketplaceAtual})
        });

        const intv = setInterval(async () => {
            const r = await fetch('/api/progresso');
            const d = await r.json();
            setBarra(true, d.percent, d.msg);
            if(d.msg.includes("PRONTO")) { clearInterval(intv); window.location.href = '/video'; }
        }, 1500);
    }
</script>
{% endblock %}
